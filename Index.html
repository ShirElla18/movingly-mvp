<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Movingly</title>
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<header class="app-header">
    	<h1>Movingly</h1>
    	<div id="countdown-banner" class="countdown-banner">
        	</div>
	</header>
 
	<main class="app-content">
    	<section id="tasks-view" class="view active">
        	<div class="progress-container">
            	<div class="progress-bar-bg">
                	<div id="progress-bar-fill" class="progress-bar-fill"></div>
            	</div>
            	<p id="progress-text">0% מההכנות הושלמו</p>
        	</div>
        	
        	<div class="date-setup">
            	<label for="move-date">תאריך המעבר:</label>
            	<input type="date" id="move-date">
            	<button id="save-date-btn">שמור</button>
        	</div>
 
        	<ul id="task-list" class="task-list">
            	</ul>
    	</section>
 
    	<section id="providers-view" class="view">
        	<div style="text-align: center; margin-bottom: 20px;">
            	<h2 style="margin: 0;">מובילים מומלצים ופנויים עבורך</h2>
            	<p style="margin: 5px 0; color: #718096; font-size: 14px;">מציג מובילים באזור מרכז</p>
        	</div>
        	<div id="providers-container" class="providers-container">
            	</div>
    	</section>
 
    	<section id="chat-view" class="view">
        	<div id="chat-history" class="chat-history">
            	<div class="chat-bubble ai-bubble">
                	היי רעות, הכיוון שאת נמצאת בשלב 3 (שבועיים למעבר). הנה מדריך בזק לאריזת המטבח. איך אוכל לעזור עוד?
            	</div>
        	</div>
        	<div class="chat-quick-replies">
            	<button class="quick-reply-btn">איך לארוז את הסלון?</button>
            	<button class="quick-reply-btn">שאלי אותי על עיצוב</button>
        	</div>
        	<div class="chat-input-area">
            	<input type="text" id="chat-input" placeholder="הקלידי הודעה...">
            	<button id="send-chat-btn">➔</button>
        	</div>
    	</section>
	</main>
 
	<nav class="bottom-nav">
    	<button class="nav-item active" data-target="tasks-view">
        	<span style="font-size: 20px;">📅</span> יומן
    	</button>
    	<button class="nav-item" data-target="providers-view">
        	<span style="font-size: 20px;">🚚</span> מובילים
    	</button>
    	<button class="nav-item" data-target="chat-view">
        	<span style="font-size: 20px;">🤖</span> סייען AI
    	</button>
    	<button class="nav-item" onclick="alert('מסך הגדרות ייבנה בהמשך')">
        	<span style="font-size: 20px;">⚙️</span> הגדרות
    	</button>
	</nav>
 
	<script src="data.js"></script>
	<script src="app.js"></script>
	<script src="ai.js"></script>
</body>
</html>
